name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build

  tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - run: npm run tauri -- build --features tauri/custom-protocol
      - name: Prepare Windows artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $out = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          $setup = Get-ChildItem "src-tauri\target\release\bundle\nsis" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $setup.FullName "$out\cdx-swap_${version}_x64-setup.exe"

          $portable = "portable\cdx-swap"
          New-Item -ItemType Directory -Force -Path $portable | Out-Null
          Copy-Item "src-tauri\target\release\cdx-swap.exe" "$portable\cdx-swap.exe"
          Compress-Archive -Path "portable\cdx-swap" -DestinationPath "$out\cdx-swap_${version}_x64-portable.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: cdx-swap-windows
          path: release-artifacts/*
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*

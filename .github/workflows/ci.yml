name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build

  tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo check --manifest-path src-tauri/Cargo.toml
      - name: Configure Windows code signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) {
            Write-Host "Windows signing secrets are not configured. Building unsigned artifacts."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate\certificate.base64.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate\certificate.base64.txt certificate\certificate.pfx
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath certificate\certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Out-Null

          function Set-JsonProperty($Object, $Name, $Value) {
            if ($Object.PSObject.Properties.Name -contains $Name) {
              $Object.$Name = $Value
            } else {
              $Object | Add-Member -MemberType NoteProperty -Name $Name -Value $Value
            }
          }

          $configPath = "src-tauri\tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json -Depth 100
          Set-JsonProperty $config.bundle.windows "certificateThumbprint" $env:WINDOWS_CERTIFICATE_THUMBPRINT
          Set-JsonProperty $config.bundle.windows "digestAlgorithm" "sha256"
          Set-JsonProperty $config.bundle.windows "timestampUrl" $(if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) { "http://timestamp.digicert.com" } else { $env:WINDOWS_TIMESTAMP_URL })
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath
      - run: npm run tauri -- build --features tauri/custom-protocol
      - name: Prepare Windows artifacts
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          .\scripts\package-windows.ps1 `
            -Version $version `
            -OutputDir "release-artifacts" `
            -SkipNodeInstall `
            -SkipTests `
            -SkipAppBuild
      - uses: actions/upload-artifact@v4
        with:
          name: cdx-swap-windows
          path: release-artifacts/*
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
